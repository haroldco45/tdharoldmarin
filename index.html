<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harold A. Marín M. - Distrileco</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary-color: #0056b3; --bg-color: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; width: 90%; max-width: 400px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; text-align: center; padding-bottom: 20px; }
        .header { background-color: var(--primary-color); padding: 35px 20px; color: white; }
        .logo { width: 140px; background: white; padding: 8px; border-radius: 12px; }
        .content { padding: 25px 20px; }
        .btn-container { display: flex; flex-direction: column; gap: 14px; }
        .btn { display: flex; align-items: center; justify-content: center; padding: 15px; border-radius: 50px; text-decoration: none; color: white; font-weight: bold; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        .btn-catalog { background: linear-gradient(45deg, #e63946, #b91d1d); }
        .btn-gps { background: #4285F4; }
        .btn-whatsapp { background-color: #25d366; }
        .btn-install { background-color: #ffcc00; color: #333; margin-top: 10px; display: none; }
        .footer { font-size: 0.8rem; color: #666; padding: 20px; border-top: 1px solid #eee; }
        .brand-highlight { color: #d4af37; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <img src="logodistrileco.PNG" alt="Logo Distrileco" class="logo">
            <h1>Harold A. Marín M.</h1>
            <div class="job-title">Área Comercial - DISTRILECO</div>
        </div>

        <div class="content">
            <div class="btn-container">
                <button id="installBtn" class="btn btn-install"><i class="fas fa-download"></i> INSTALAR APP</button>
                <a href="catalogod.pdf" target="_blank" class="btn btn-catalog"><i class="fas fa-file-pdf"></i> VER CATÁLOGO</a>
                <a href="https://www.google.com/maps?q=Carrera+21+B+No+13A+64+Caucasia" target="_blank" class="btn btn-gps"><i class="fas fa-map-marker-alt"></i> UBICACIÓN GPS</a>
                <a href="https://wa.me/573117700431" class="btn btn-whatsapp"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
            </div>
        </div>

        <div class="footer">
            <div class="brand-highlight">✨ Vibras Positivas ✨</div>
            <p><strong>Marcas: SUPERARROZ Y VISTAHERMOSA</strong></p>
            <p>DERECHOS DE AUTOR © 2026 | 3117700431</p>
        </div>
    </div>

    <script>
        // Registro del Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // Lógica de Instalación
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.style.display = 'flex';
        });

        installBtn.addEventListener('click', () => {
            installBtn.style.display = 'none';
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choice) => {
                if (choice.outcome === 'accepted') { console.log('App instalada'); }
            });
        });
    </script>
</body>
</html>
