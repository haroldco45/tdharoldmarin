<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harold A. Marín M. - Distrileco</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0056b3; /* Azul Distrileco */
            --secondary-color: #25d366; /* Verde WhatsApp */
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
        }

        .card {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            text-align: center;
            padding-bottom: 20px;
        }

        .header {
            background-color: var(--primary-color);
            padding: 30px 20px;
            color: white;
        }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 10px;
            border-radius: 10px;
            background: white;
            padding: 5px;
        }

        h1 {
            font-size: 1.4rem;
            margin: 10px 0 5px;
            text-transform: uppercase;
        }

        .job-title {
            font-size: 0.9rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .content {
            padding: 20px;
        }

        .info-item {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .info-item i {
            margin-right: 10px;
            color: var(--primary-color);
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 20px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            border-radius: 50px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn i {
            margin-right: 10px;
        }

        .btn-whatsapp { background-color: #25d366; }
        .btn-chatbot { background-color: #00a884; }
        .btn-catalog { background-color: #ff4b2b; }
        .btn-web { background-color: #333; }
        .btn-facebook { background-color: #1877f2; }
        .btn-instagram { background-color: #e4405f; }

        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #777;
        }

        .logo-vibras {
            width: 60px;
            margin-top: 10px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <img src="logodistrileco.PNG" alt="Distrileco Logo" class="logo">
            <h1>Harold A. Marín M.</h1>
            <div class="job-title">Área Comercial - DISTRILECO</div>
        </div>

        <div class="content">
            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>Carrera 21 B No 13A 64, Caucasia</span>
            </div>
            
            <div class="btn-container">
                <a href="https://wa.me/573117700431" class="btn btn-whatsapp">
                    <i class="fab fa-whatsapp"></i> WhatsApp Personal
                </a>

                <a href="https://wa.me/573206134987" class="btn btn-chatbot">
                    <i class="fas fa-robot"></i> Chatbot Pedidos
                </a>

                <a href="https://www.distrileco.com/" target="_blank" class="btn btn-catalog">
                    <i class="fas fa-book-open"></i> Ver Catálogo PDF
                </a>

                <a href="https://haroldco45.github.io/vibras-positivas-apps/distrileco/index.html" class="btn btn-web">
                    <i class="fas fa-globe"></i> App Web Oficial
                </a>

                <a href="https://www.facebook.com/share/18eizHmaUK/" class="btn btn-facebook">
                    <i class="fab fa-facebook"></i> Facebook
                </a>

                <a href="https://www.instagram.com/distrileco_caucasia" class="btn btn-instagram">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
            </div>
        </div>

        <div class="footer">
            <p>Atención a Clientes y Proveedores</p>
            <p><strong>Marcas: SUPERARROZ Y VISTAHERMOSA</strong></p>
            <div style="font-weight: bold; color: #ffcc00;">Vibras Positivas</div>
        </div>
    </div>

</body>
</html>
